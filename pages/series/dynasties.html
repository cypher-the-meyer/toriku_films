<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriku Films | Dynasties</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    
    <style>
        body { 
            background-color: #0a0a0a !important; 
            color: #f0f0f0;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes bamboo-sway {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }
        
        .bamboo-decoration {
            position: fixed;
            right: 50px;
            bottom: 0;
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
        }
        
        .bamboo-stalk {
            width: 12px;
            height: 400px;
            background: linear-gradient(to right, #1a2e1a, #2d4c2d);
            border-radius: 4px;
            transform-origin: bottom center;
            animation: bamboo-sway 6s ease-in-out infinite alternate;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(250, 235, 215, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C02F12; border-radius: 10px; }
        
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Data Models ---
        const SERIES_DETAILS = {
            title: "Dynasties",
            year: "2026",
            rating: "18+",
            genre: "Fantasy • Sci-fi • Blood",
            description: "In moments of crisis, what will you do to save your people? As the Great Houses reach the brittle peak of their tolerance, a centuries-long peace begins to fracture under the weight of cosmic ambition and arcane greed. In a world where hyper-advanced technology meets primordial blood-magic, the risk of total war looms over every border. When the foundations of civilization start to crumble, leaders must decide if they will become the architects of a new era or the executioners of the old. Survival is no longer a right—it is a debt paid in blood.",
            // Updated heroImage source path
            heroImage: "media/posters/dynasties/AdmoniCity.png",
            chapters: [
                { id: 1, num: "01", title: "Peak of Tolerance", duration: "24:00" },
                { id: 2, num: "02", title: "Fractured Zenith", duration: "23:45" },
                { id: 3, num: "03", title: "Aether & Iron", duration: "24:12" },
                { id: 4, num: "04", title: "The Blood Seal", duration: "23:58" },
                { id: 5, num: "05", title: "Sovereign Debt", duration: "24:05" },
                { id: 6, num: "06", title: "Horizon Ablaze", duration: "24:00" },
            ]
        };

        const CAST = [
            { id: 1, name: "Soren Valerius", role: "High Archon" },
            { id: 2, name: "Lyra Thorne", role: "Pilot" },
            { id: 3, name: "Kaelen Voss", role: "Diplomat" },
            { id: 4, name: "Elara Vance", role: "Oracle" },
            { id: 5, name: "General Malus", role: "Warmonger" },
        ];

        // --- Subcomponents ---
        const SectionHeader = ({ title }) => (
            <div className="flex items-center gap-3 mb-8">
                <span className="w-1.5 h-6 bg-[#C02F12] rounded-full"></span>
                <h2 className="text-xl md:text-2xl font-serif text-white tracking-wide uppercase">{title}</h2>
            </div>
        );

        // --- Main Page Component ---
        const App = () => {
            return (
                <div className="min-h-screen bg-[#0a0a0b] relative">
                    {/* Decorative Bamboo Element */}
                    <div className="bamboo-decoration">
                        <div className="bamboo-stalk"></div>
                    </div>

                    {/* HERO CONTAINER */}
                    <div className="relative w-full h-[65vh] md:h-[80vh] overflow-hidden">
                        <div 
                            className="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-105"
                            style={{ 
                                backgroundImage: `url(${SERIES_DETAILS.heroImage})`,
                                mixBlendMode: 'luminosity'
                            }}
                        />
                        {/* Dissolve Gradients */}
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0b] via-[#0a0a0b]/40 to-transparent"></div>
                        <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0b] via-transparent to-transparent hidden md:block"></div>
                        
                        <div className="absolute bottom-12 left-8 md:left-24 z-10">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="bg-[#C02F12] text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-tighter">2026 Release</span>
                                <span className="text-white/60 text-sm font-medium">{SERIES_DETAILS.genre}</span>
                            </div>
                            <h1 className="text-6xl md:text-9xl font-serif font-bold text-white tracking-tighter mb-4">
                                {SERIES_DETAILS.title}
                            </h1>
                        </div>
                    </div>

                    {/* CONTENT GRID: CHAPTER INDEX & EXCERPT */}
                    <main className="max-w-7xl mx-auto px-8 py-20">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start mb-32">
                            {/* Column 1: Chapter Index */}
                            <div className="lg:col-span-5 bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-md">
                                <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                                    <h3 className="text-white font-serif text-xl font-bold italic tracking-wide">Season 1 Manifest</h3>
                                    <span className="text-[#C02F12] text-xs font-mono uppercase tracking-widest">{SERIES_DETAILS.chapters.length} Parts</span>
                                </div>
                                <div className="space-y-1 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {SERIES_DETAILS.chapters.map((chapter) => (
                                        <div 
                                            key={chapter.id} 
                                            className="group flex items-center justify-between p-4 rounded-xl hover:bg-[#C02F12]/10 transition-all cursor-pointer border border-transparent hover:border-[#C02F12]/20"
                                        >
                                            <div className="flex items-center gap-4">
                                                <span className="text-[#C02F12] font-mono text-xs opacity-50 group-hover:opacity-100">{chapter.num}</span>
                                                <span className="text-white/90 text-sm md:text-base font-medium group-hover:text-white">{chapter.title}</span>
                                            </div>
                                            <span className="text-white/30 text-[10px] md:text-xs font-mono">{chapter.duration}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Column 2: Excerpt/Description */}
                            <div className="lg:col-span-7 flex flex-col justify-center h-full">
                                <SectionHeader title="The Narrative" />
                                <p className="text-xl md:text-2xl text-white/80 leading-relaxed font-light mb-8 italic border-l-4 border-[#C02F12] pl-8">
                                    {SERIES_DETAILS.description}
                                </p>
                                <div className="flex gap-6">
                                    <button className="px-10 py-4 bg-[#C02F12] text-white font-black text-xs uppercase tracking-[0.2em] rounded-full hover:bg-white hover:text-[#0a0a0b] transition-all transform hover:scale-105 shadow-xl shadow-[#C02F12]/20">
                                        Enter Realm
                                    </button>
                                    <button className="px-10 py-4 border border-white/20 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full hover:bg-white/5 transition-all">
                                        Watch Teaser
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* CAST SECTION */}
                        <section className="mb-32">
                            <SectionHeader title="The Council" />
                            <div className="flex flex-wrap gap-8 md:gap-12 justify-start">
                                {CAST.map((person) => (
                                    <div key={person.id} className="group text-center">
                                        <div className="w-24 h-24 md:w-32 md:h-32 rounded-full bg-white/5 border-2 border-white/10 mb-4 overflow-hidden group-hover:border-[#C02F12] transition-all duration-500 relative flex items-center justify-center">
                                            <div className="absolute inset-0 bg-gradient-to-tr from-[#C02F12]/20 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            <span className="text-white/10 text-4xl md:text-5xl font-serif select-none group-hover:scale-110 group-hover:text-[#C02F12]/40 transition-all duration-500">
                                                {person.name.charAt(0)}
                                            </span>
                                        </div>
                                        <h4 className="text-white text-sm md:text-base font-bold mb-1 group-hover:text-[#C02F12] transition-colors">{person.name}</h4>
                                        <p className="text-[#C02F12] text-[10px] uppercase font-black tracking-widest opacity-60">{person.role}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-white/5 py-12 px-8 text-center bg-gradient-to-t from-black/40 to-transparent">
                        <p className="text-white/20 text-[10px] tracking-[0.4em] uppercase font-bold">
                            &copy; 2026 Toriku Films • Excellence in Narrative Animation
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
