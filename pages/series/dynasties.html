<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriku Films | Series</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    
    <style>
        body { 
            background-color: #0a0a0a !important; 
            color: #f0f0f0;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes bamboo-sway {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }
        
        .bamboo-decoration {
            position: fixed;
            right: 50px;
            bottom: 0;
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
        }
        
        .bamboo-stalk {
            width: 12px;
            height: 400px;
            background: linear-gradient(to right, #1a2e1a, #2d4c2d);
            border-radius: 4px;
            transform-origin: bottom center;
            animation: bamboo-sway 6s ease-in-out infinite alternate;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(250, 235, 215, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C02F12; border-radius: 10px; }
        
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Data Models ---
        const SERIES_DETAILS = {
            title: "Dynasties",
            year: "2026",
            rating: "18+",
            genre: "Fantasy • Sci-fi • Blood",
            description: "In moments of crisis, what will you do to save your people? As the Great Houses reach the brittle peak of their tolerance, a centuries-long peace begins to fracture under the weight of cosmic ambition and arcane greed. In a world where hyper-advanced technology meets primordial blood-magic, the risk of total war looms over every border.",
            heroImage: "/media/posters/dynasties/AdmoniCity.png",
            chapters: [
                { id: 1, num: "01", title: "Peak of Tolerance", duration: "24:00" },
                { id: 2, num: "02", title: "Fractured Zenith", duration: "23:45" },
                { id: 3, num: "03", title: "Aether & Iron", duration: "24:12" },
                { id: 4, num: "04", title: "The Blood Seal", duration: "23:58" },
                { id: 5, num: "05", title: "Sovereign Debt", duration: "24:05" },
                { id: 6, num: "06", title: "Horizon Ablaze", duration: "24:00" },
            ]
        };

        const GALLERY = [
            { id: 1, url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1600", caption: "The Inner Sanctum" },
            { id: 2, url: "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1600", caption: "Neon Wastelands" },
            { id: 3, url: "https://images.unsplash.com/photo-1501446529957-6226bd447c46?q=80&w=1600", caption: "The Aether Spire" }
        ];

        const CAST = [
            { id: 1, name: "Soren Valerius", role: "High Archon" },
            { id: 2, name: "Lyra Thorne", role: "Pilot" },
            { id: 3, name: "Kaelen Voss", role: "Diplomat" },
            { id: 4, name: "Elara Vance", role: "Oracle" },
            { id: 5, name: "General Malus", role: "Warmonger" },
        ];

        // --- Subcomponents ---
        const SectionHeader = ({ title }) => (
            <div className="flex items-center gap-3 mb-8">
                <span className="w-1.5 h-6 bg-[#C02F12] rounded-full"></span>
                <h2 className="text-xl md:text-2xl font-serif text-white tracking-wide uppercase">{title}</h2>
            </div>
        );

        const GalleryCarousel = () => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % GALLERY.length);
                }, 5000);
                return () => clearInterval(timer);
            }, []);

            const next = () => setCurrentIndex((currentIndex + 1) % GALLERY.length);
            const prev = () => setCurrentIndex((currentIndex - 1 + GALLERY.length) % GALLERY.length);

            return (
                <div className="relative group w-full h-[400px] md:h-[600px] rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                    {/* Slides */}
                    {GALLERY.map((img, idx) => (
                        <div 
                            key={img.id}
                            className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${idx === currentIndex ? 'opacity-100' : 'opacity-0'}`}
                        >
                            <img src={img.url} alt={img.caption} className="w-full h-full object-cover transform scale-105 group-hover:scale-100 transition-transform duration-[10s]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                            <div className="absolute bottom-10 left-10">
                                <p className="text-[#C02F12] font-mono text-xs uppercase tracking-widest mb-2">Visual Archive</p>
                                <h3 className="text-white text-3xl font-serif italic">{img.caption}</h3>
                            </div>
                        </div>
                    ))}

                    {/* Controls */}
                    <div className="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-6 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={prev} className="p-4 bg-black/40 backdrop-blur-md rounded-full text-white hover:bg-[#C02F12] transition-all">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg>
                        </button>
                        <button onClick={next} className="p-4 bg-black/40 backdrop-blur-md rounded-full text-white hover:bg-[#C02F12] transition-all">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>

                    {/* Indicators */}
                    <div className="absolute bottom-8 right-10 flex gap-2">
                        {GALLERY.map((_, idx) => (
                            <button 
                                key={idx}
                                onClick={() => setCurrentIndex(idx)}
                                className={`h-1 transition-all duration-500 rounded-full ${idx === currentIndex ? 'w-8 bg-[#C02F12]' : 'w-2 bg-white/20'}`}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        // --- Main Page Component ---
        const App = () => {
            return (
                <div className="min-h-screen bg-[#0a0a0b] relative">
                    <div className="bamboo-decoration">
                        <div className="bamboo-stalk"></div>
                    </div>

                    {/* HERO CONTAINER */}
                    <div className="relative w-full h-[65vh] md:h-[80vh] overflow-hidden">
                        <div 
                            className="absolute inset-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-105"
                            style={{ backgroundImage: `url(${SERIES_DETAILS.heroImage})`, mixBlendMode: 'luminosity' }}
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0b] via-[#0a0a0b]/40 to-transparent"></div>
                        <div className="absolute bottom-12 left-8 md:left-24 z-10">
                            <h1 className="text-6xl md:text-9xl font-serif font-bold text-white tracking-tighter mb-4">{SERIES_DETAILS.title}</h1>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-8 py-20">
                        {/* NARRATIVE GRID */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start mb-32">
                            <div className="lg:col-span-5 bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-md">
                                <div className="space-y-1 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {SERIES_DETAILS.chapters.map((chapter) => (
                                        <div key={chapter.id} className="group flex items-center justify-between p-4 rounded-xl hover:bg-[#C02F12]/10 transition-all cursor-pointer border border-transparent hover:border-[#C02F12]/20">
                                            <span className="text-white/90 text-sm font-medium">{chapter.title}</span>
                                            <span className="text-white/30 text-[10px] font-mono">{chapter.duration}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="lg:col-span-7">
                                <SectionHeader title="The Narrative" />
                                <p className="text-xl md:text-2xl text-white/80 leading-relaxed font-light mb-8 italic border-l-4 border-[#C02F12] pl-8">
                                    {SERIES_DETAILS.description}
                                </p>
                            </div>
                        </div>

                        {/* NEW SLIDESHOW ROW */}
                        <section className="mb-32">
                            <SectionHeader title="Visual Scenarios" />
                            <GalleryCarousel />
                        </section>

                        {/* CAST SECTION */}
                        <section className="mb-32">
                            <SectionHeader title="The Council" />
                            <div className="flex flex-wrap gap-8 md:gap-12">
                                {CAST.map((person) => (
                                    <div key={person.id} className="group text-center">
                                        <div className="w-24 h-24 md:w-32 md:h-32 rounded-full bg-white/5 border-2 border-white/10 mb-4 overflow-hidden group-hover:border-[#C02F12] transition-all flex items-center justify-center">
                                            <span className="text-white/10 text-4xl font-serif">{person.name.charAt(0)}</span>
                                        </div>
                                        <h4 className="text-white text-sm font-bold">{person.name}</h4>
