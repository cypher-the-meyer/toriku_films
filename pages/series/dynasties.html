<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriku Films | Dynasties</title>
    
    <link rel="stylesheet" href="layout.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Specific overlays for the Hero section that require absolute positioning */
        .hero-dissolve-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0b 0%, #0a0a0b 10%, transparent 60%);
            z-index: 2;
        }

        .hero-vignette-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, transparent 0%, rgba(10, 10, 11, 0.4) 50%, #0a0a0b 100%);
            z-index: 1;
        }

        /* Lightbox Animation */
        .animate-zoom { animation: zoom 0.3s ease-out; }
        @keyframes zoom {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px;}
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(250, 235, 215, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C02F12; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SERIES_DETAILS = {
            title: "Dynasties",
            genre: "Fantasy • Sci-fi • Blood",
            description: "In moments of crisis, what will you do to save your people? As the Great Houses reach the brittle peak of their tolerance, a centuries-long peace begins to fracture under the weight of cosmic ambition and arcane greed.",
            heroImage: "media/posters/dynasties/AdmoniCity.png", 
            chapters: [
                { id: 1, title: "Peak of Tolerance", duration: "24:00" },
                { id: 2, title: "Fractured Zenith", duration: "23:45" },
                { id: 3, title: "Aether & Iron", duration: "24:12" },
                { id: 4, title: "The Blood Seal", duration: "23:58" },
                { id: 5, title: "Sovereign Debt", duration: "24:05" },
            ]
        };

        const SCREENSHOTS = [
            { id: 1, url: "media/posters/dynasties/Dorje.png", caption: "Dorje" },
            { id: 2, url: "media/posters/dynasties/Sonam.png", caption: "Sonam" },
            { id: 3, url: "media/posters/dynasties/hal.png", caption: "Hal" },
            { id: 4, url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1600", caption: "The Inner Sanctum" }
        ];

        const CAST = [
            { id: 1, name: "Soren Valerius", role: "High Archon" },
            { id: 2, name: "Lyra Thorne", role: "Pilot" },
            { id: 3, name: "Kaelen Voss", role: "Diplomat" },
            { id: 4, name: "Elara Vance", role: "Oracle" },
        ];

        const SectionHeader = ({ title }) => (
            <div className="flex items-center gap-3 mb-8">
                <span className="w-1.5 h-6 bg-[#C02F12] rounded-full"></span>
                <h2 className="text-xl md:text-2xl font-serif text-white tracking-wide uppercase">{title}</h2>
            </div>
        );

        const Lightbox = ({ image, onClose }) => {
            if (!image) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-sm p-4" onClick={onClose}>
                    <div className="relative max-w-5xl w-full animate-zoom" onClick={e => e.stopPropagation()}>
                        <img src={image.url} className="w-full h-auto rounded-lg shadow-2xl border border-white/10" alt={image.caption} />
                        <div className="mt-4 flex items-center gap-4">
                            <span className="w-12 h-[1px] bg-[#C02F12]"></span>
                            <h3 className="text-white font-serif text-xl italic">{image.caption}</h3>
                        </div>
                        <button onClick={onClose} className="absolute -top-12 right-0 text-white/50 hover:text-white text-sm tracking-[0.3em] uppercase">Close [x]</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedImg, setSelectedImg] = React.useState(null);

            return (
                <div className="min-h-screen">
                    <Lightbox image={selectedImg} onClose={() => setSelectedImg(null)} />

                    <header className="relative w-full h-[85vh] overflow-hidden bg-black">
                        <div className="absolute inset-0 bg-cover bg-center bg-no-repeat" style={{ backgroundImage: `url(${SERIES_DETAILS.heroImage})` }} />
                        <div className="hero-vignette-overlay"></div>
                        <div className="hero-dissolve-overlay"></div>
                        <div className="absolute bottom-16 left-8 md:left-24 z-10 max-w-4xl">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="bg-[#C02F12] text-white text-[10px] font-black px-3 py-1.5 rounded uppercase tracking-[0.2em]">Live Session</span>
                                <span className="text-white/80 text-sm font-bold tracking-widest uppercase">{SERIES_DETAILS.genre}</span>
                            </div>
                            <h1 className="text-7xl md:text-[10rem] font-serif font-bold text-white tracking-tighter leading-none mb-4 drop-shadow-2xl">
                                {SERIES_DETAILS.title}
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-8 py-24 relative z-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 mb-40">
                            <div className="lg:col-span-5 bg-white/[0.02] border border-white/5 rounded-3xl p-10 backdrop-blur-md">
                                <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                                    <h3 className="text-white font-serif text-2xl font-bold italic tracking-tight">Manifest</h3>
                                    <span className="text-[#C02F12] text-[10px] font-black uppercase tracking-widest italic">In Production</span>
                                </div>
                                <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                    {SERIES_DETAILS.chapters.map((c, i) => (
                                        <div key={i} className="flex items-center justify-between p-4 rounded-xl hover:bg-[#C02F12]/10 transition-all cursor-pointer group">
                                            <span className="text-white/60 text-sm group-hover:text-white transition-colors uppercase tracking-widest">{c.title}</span>
                                            <span className="text-[#C02F12] text-[10px] font-mono font-bold">{c.duration}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="lg:col-span-7">
                                <SectionHeader title="The Narrative" />
                                <p className="text-2xl md:text-3xl text-white/90 leading-tight font-light mb-10 italic border-l-4 border-[#C02F12] pl-8 py-2">
                                    {SERIES_DETAILS.description}
                                </p>
                                <button className="group relative px-10 py-4 overflow-hidden rounded-full bg-[#FAEBD7] text-[#0a0a0b] font-black text-[10px] uppercase tracking-[0.3em] transition-all">
                                    Enter Realm
                                </button>
                            </div>
                        </div>

                        {/* Visual Codex Section */}
                        <section className="mb-40">
                            <SectionHeader title="Visual Codex" />
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {SCREENSHOTS.map((shot) => (
                                    <div key={shot.id} className="group cursor-pointer" onClick={() => setSelectedImg(shot)}>
                                        <div className="aspect-[16/10] rounded-xl overflow-hidden border border-white/10 group-hover:border-[#C02F12] transition-all duration-500 relative bg-black">
                                            <img src={shot.url} className="w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-60"></div>
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                <div className="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 text-[9px] uppercase tracking-widest font-bold">Inspect</div>
                                            </div>
                                            <p className="absolute bottom-3 left-4 text-white text-[10px] font-bold tracking-widest uppercase">{shot.caption}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="mb-24">
                            <SectionHeader title="The Council" />
                            <div className="flex flex-wrap gap-12">
                                {CAST.map((p) => (
                                    <div key={p.id} className="group">
                                        <div className="w-24 h-24 rounded-full bg-white/[0.03] border border-white/10 mb-4 flex items-center justify-center group-hover:border-[#C02F12] transition-all">
                                            <span className="text-white/10 text-3xl font-serif">{p.name.charAt(0)}</span>
                                        </div>
                                        <h4 className="text-white text-sm font-bold tracking-tight mb-1">{p.name}</h4>
                                        <p className="text-[#C02F12] text-[9px] uppercase font-black tracking-widest">{p.role}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="border-t border-white/5 py-12 px-8 text-center bg-black/40 backdrop-blur-sm">
                        <p className="text-white/10 text-[9px] tracking-[0.6em] uppercase font-bold">
                            &copy; 2026 Toriku Films • Excellence in Narrative Animation
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
