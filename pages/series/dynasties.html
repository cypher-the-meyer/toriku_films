<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriku Films | Series</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    
    <style>
        body { 
            background-color: #0a0a0b !important; 
            color: #f0f0f0;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .hero-dissolve-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0b 0%, #0a0a0b 10%, transparent 60%);
            z-index: 2;
        }

        .hero-vignette-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, transparent 0%, rgba(10, 10, 11, 0.4) 50%, #0a0a0b 100%);
            z-index: 1;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px;}
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(250, 235, 215, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C02F12; border-radius: 10px; }
        
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SERIES_DETAILS = {
            title: "Dynasties",
            genre: "Fantasy • Sci-fi • Blood",
            description: "In moments of crisis, what will you do to save your people? As the Great Houses reach the brittle peak of their tolerance, a centuries-long peace begins to fracture under the weight of cosmic ambition and arcane greed. In a world where hyper-advanced technology meets primordial blood-magic, the risk of total war looms over every border.",
            heroImage: "media/posters/dynasties/AdmoniCity.png", 
            chapters: [
                { id: 1, num: "01", title: "Peak of Tolerance", duration: "24:00" },
                { id: 2, num: "02", title: "Fractured Zenith", duration: "23:45" },
                { id: 3, num: "03", title: "Aether & Iron", duration: "24:12" },
                { id: 4, num: "04", title: "The Blood Seal", duration: "23:58" },
                { id: 5, num: "05", title: "Sovereign Debt", duration: "24:05" },
                { id: 6, num: "06", title: "Horizon Ablaze", duration: "24:00" },
            ]
        };

        // Visual Codex Data including your specific images
        const SCREENSHOTS = [
            { id: 1, url: "media/posters/dynasties/Dorje.png", caption: "Dorje" },
            { id: 2, url: "media/posters/dynasties/Sonam.png", caption: "Sonam" },
            { id: 3, url: "media/posters/dynasties/Hal.png", caption: "Hal" },
            { id: 4, url: "https://images.unsplash.com/photo-1599419139046-e5c9a9307c08?q=80&w=600", caption: "Archives" },
            { id: 5, url: "https://images.unsplash.com/photo-1617396111389-b9818193a02f?q=80&w=600", caption: "The Bridge" },
            { id: 6, url: "https://images.unsplash.com/photo-1549490313-097b6a65574c?q=80&w=600", caption: "Aether Flow" },
        ];

        const CAST = [
            { id: 1, name: "Soren Valerius", role: "High Archon" },
            { id: 2, name: "Lyra Thorne", role: "Pilot" },
            { id: 3, name: "Kaelen Voss", role: "Diplomat" },
            { id: 4, name: "Elara Vance", role: "Oracle" },
            { id: 5, name: "General Malus", role: "Warmonger" },
        ];

        const SectionHeader = ({ title }) => (
            <div className="flex items-center gap-3 mb-8">
                <span className="w-1.5 h-6 bg-[#C02F12] rounded-full"></span>
                <h2 className="text-xl md:text-2xl font-serif text-white tracking-wide uppercase">{title}</h2>
            </div>
        );

        const ScreenshotPreviewRow = () => {
            const scrollRef = React.useRef(null);
            const scroll = (dir) => {
                if (scrollRef.current) scrollRef.current.scrollLeft += dir === 'left' ? -400 : 400;
            };
            return (
                <section className="mb-32 relative group">
                    <SectionHeader title="Visual Codex" />
                    <div className="flex gap-4 overflow-x-hidden scroll-smooth pb-4 custom-scrollbar" ref={scrollRef}>
                        {SCREENSHOTS.map((shot) => (
                            <div key={shot.id} className="flex-none w-52 group/item cursor-pointer">
                                <div className="aspect-[16/10] h-32 rounded-xl overflow-hidden border border-white/10 group-hover/item:border-[#C02F12] transition-all relative">
                                    <img 
                                        src={shot.url} 
                                        className="w-full h-full object-cover opacity-80 group-hover/item:scale-110 group-hover/item:opacity-100 transition-all duration-500" 
                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/600x400/1a1a1a/C02F12?text=Image+Not+Found'; }}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent"></div>
                                    <p className="absolute bottom-2 left-2 text-white text-[10px] font-medium tracking-wide uppercase">{shot.caption}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-[#0a0a0b]">
                    <header className="relative w-full h-[75vh] md:h-[85vh] overflow-hidden bg-black">
                        <div 
                            className="absolute inset-0 bg-cover bg-center bg-no-repeat"
                            style={{ backgroundImage: `url(${SERIES_DETAILS.heroImage})` }}
                        />
                        <div className="hero-vignette-overlay"></div>
                        <div className="hero-dissolve-overlay"></div>
                        
                        <div className="absolute bottom-16 left-8 md:left-24 z-10 max-w-4xl">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="bg-[#C02F12] text-white text-[10px] font-black px-3 py-1.5 rounded uppercase tracking-[0.2em]">Dynasties S1</span>
                                <span className="text-white/80 text-sm font-bold tracking-widest uppercase">{SERIES_DETAILS.genre}</span>
                            </div>
                            <h1 className="text-8xl md:text-[12rem] font-serif font-bold text-white tracking-tighter leading-none mb-4 drop-shadow-2xl">
                                {SERIES_DETAILS.title}
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-8 py-24">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start mb-40">
                            <div className="lg:col-span-5 bg-white/[0.03] border border-white/10 rounded-3xl p-10 backdrop-blur-xl shadow-2xl">
                                <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
                                    <h3 className="text-white font-serif text-2xl font-bold italic tracking-tight">Season 1 Manifest</h3>
                                    <span className="text-[#C02F12] text-[10px] font-black uppercase tracking-widest">Active</span>
                                </div>
                                <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {SERIES_DETAILS.chapters.map((c) => (
                                        <div key={c.id} className="flex items-center justify-between p-4 rounded-xl hover:bg-[#C02F12]/10 transition-all cursor-pointer group">
                                            <span className="text-white/60 text-sm font-medium group-hover:text-white transition-colors uppercase tracking-widest">{c.title}</span>
                                            <span className="text-[#C02F12] text-[10px] font-mono font-bold">{c.duration}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="lg:col-span-7 pt-4">
                                <SectionHeader title="The Narrative" />
                                <p className="text-2xl md:text-3xl text-white/90 leading-tight font-light mb-10 italic border-l-8 border-[#C02F12] pl-10 py-2">
                                    {SERIES_DETAILS.description}
                                </p>
                                <button className="group relative px-12 py-5 overflow-hidden rounded-full bg-white text-black font-black text-xs uppercase tracking-[0.3em] transition-all hover:pr-16">
                                    <span className="relative z-10">Enter Realm</span>
                                    <span className="absolute right-6 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-all">→</span>
                                </button>
                            </div>
                        </div>

                        {/* Visual Codex with your new images */}
                        <ScreenshotPreviewRow />

                        <section className="mb-40">
                            <SectionHeader title="The Council" />
                            <div className="flex flex-wrap gap-10 md:gap-16">
                                {CAST.map((p) => (
                                    <div key={p.id} className="group text-center">
                                        <div className="w-28 h-28 md:w-36 md:h-36 rounded-full bg-gradient-to-br from-white/10 to-transparent border border-white/10 mb-6 overflow-hidden group-hover:border-[#C02F12] transition-all flex items-center justify-center relative shadow-2xl">
                                            <span className="text-white/5 text-5xl font-serif group-hover:text-[#C02F12]/40 transition-all">{p.name.charAt(0)}</span>
                                            <div className="absolute inset-0 bg-[#C02F12]/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                        </div>
                                        <h4 className="text-white text-base font-bold tracking-tight mb-1">{p.name}</h4>
                                        <p className="text-[#C02F12] text-[10px] uppercase font-black tracking-[0.2em]">{p.role}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="border-t border-white/5 py-16 px-8 text-center bg-[#050506]">
                        <p className="text-white/10 text-[9px] tracking-[0.6em] uppercase font-bold">
                            &copy; 2026 Toriku Films • Excellence in Narrative Animation
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
