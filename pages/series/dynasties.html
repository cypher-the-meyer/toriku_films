<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toriku Films | Series</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    
    <style>
        body { 
            background-color: #0a0a0b !important; 
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Hero Image Container - Forced Visibility */
        .hero-bg-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        /* The Dissolving Gradients */
        .hero-master-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            /* Bottom dissolve to page color */
            background: linear-gradient(to top, #0a0a0b 0%, transparent 70%),
                        radial-gradient(circle at 50% 50%, transparent 20%, rgba(10,10,11,0.5) 100%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px;}
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(250, 235, 215, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C02F12; border-radius: 10px; }
        
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SERIES_DETAILS = {
            title: "Dynasties",
            genre: "Fantasy • Sci-fi • Blood",
            description: "In moments of crisis, what will you do to save your people? As the Great Houses reach the brittle peak of their tolerance, a centuries-long peace begins to fracture under the weight of cosmic ambition and arcane greed.",
            heroImage: "media/posters/dynasties/AdmoniCity.png", 
            chapters: [
                { id: 1, title: "Peak of Tolerance", duration: "24:00" },
                { id: 2, title: "Fractured Zenith", duration: "23:45" },
                { id: 3, title: "Aether & Iron", duration: "24:12" },
                { id: 4, title: "The Blood Seal", duration: "23:58" },
            ]
        };

        const SCREENSHOTS = [
            { id: 1, url: "media/posters/dynasties/Dorje.png", caption: "Dorje" },
            { id: 2, url: "media/posters/dynasties/Sonam.png", caption: "Sonam" },
            { id: 3, url: "media/posters/dynasties/Hal.png", caption: "Hal" },
            { id: 4, url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600", caption: "Sanctum" },
        ];

        const SectionHeader = ({ title }) => (
            <div className="flex items-center gap-3 mb-8">
                <span className="w-1.5 h-6 bg-[#C02F12] rounded-full"></span>
                <h2 className="text-xl md:text-2xl font-serif text-white tracking-wide uppercase">{title}</h2>
            </div>
        );

        const VisualCodex = () => {
            const scrollRef = React.useRef(null);
            return (
                <section className="mb-32 relative">
                    <SectionHeader title="Visual Codex" />
                    <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar" ref={scrollRef}>
                        {SCREENSHOTS.map((shot) => (
                            <div key={shot.id} className="flex-none w-64 group cursor-pointer">
                                <div className="aspect-video rounded-xl overflow-hidden border border-white/10 hover:border-[#C02F12] transition-all bg-zinc-900">
                                    <img 
                                        src={shot.url} 
                                        className="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"
                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/600x400/000/C02F12?text=Path+Error'; }}
                                    />
                                </div>
                                <p className="mt-2 text-[10px] text-white/50 font-bold uppercase tracking-widest">{shot.caption}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => {
            return (
                <div className="relative">
                    {/* HERO SECTION */}
                    <header className="relative w-full h-[80vh] flex items-end">
                        <div 
                            className="hero-bg-container"
                            style={{ backgroundImage: `url(${SERIES_DETAILS.heroImage})` }}
                        />
                        <div className="hero-master-overlay" />
                        
                        <div className="relative z-10 px-8 md:px-24 pb-20 w-full">
                            <span className="bg-[#C02F12] text-white text-[10px] font-black px-3 py-1 rounded uppercase tracking-widest mb-4 inline-block">S1 PREVIEW</span>
                            <h1 className="text-7xl md:text-9xl font-serif font-bold text-white tracking-tighter leading-none drop-shadow-2xl">
                                {SERIES_DETAILS.title}
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-8 py-24 relative z-20">
                        {/* NARRATIVE SECTION */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 mb-40">
                            <div className="lg:col-span-5 bg-white/[0.03] border border-white/10 rounded-3xl p-8 backdrop-blur-md">
                                <h3 className="text-white font-serif text-xl mb-6 italic">Manifest</h3>
                                {SERIES_DETAILS.chapters.map(c => (
                                    <div key={c.id} className="flex justify-between p-3 border-b border-white/5 text-sm text-white/60">
                                        <span>{c.title}</span>
                                        <span className="font-mono text-[#C02F12]">{c.duration}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="lg:col-span-7">
                                <SectionHeader title="The Narrative" />
                                <p className="text-2xl text-white/80 italic border-l-4 border-[#C02F12] pl-8 leading-relaxed">
                                    {SERIES_DETAILS.description}
                                </p>
                            </div>
                        </div>

                        {/* VISUAL CODEX - Isolated component */}
                        <VisualCodex />
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
